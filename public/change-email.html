<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Email Change</title>
    <style>
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background-color: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        box-sizing: border-box;
        animation: fadeIn 1s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      h1 {
        margin-bottom: 24px;
        font-size: 28px;
        color: #333;
        text-align: center;
      }
      .form-group {
        margin-bottom: 20px;
        width: 100%;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        box-sizing: border-box;
        transition: border-color 0.3s ease;
      }
      .form-group input:focus {
        border-color: #007bff;
        outline: none;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        box-sizing: border-box;
      }
      button:hover {
        background-color: #0056b3;
      }
      .footer {
        margin-top: 20px;
        text-align: center;
        color: #777;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Confirm Email Change</h1>
      <form method="POST" action="/auth/confirm-change-email">
        <input type="hidden" name="token" value="{{token}}" />
        <div class="form-group">
          <label for="newEmail">New Email</label>
          <input
            type="email"
            id="newEmail"
            name="newEmail"
            required
            placeholder="Enter your new email"
          />
        </div>
        <button type="submit">Confirm Email Change</button>
      </form>
      <div class="footer">
        <p>&copy; 2024 Yallery</p>
      </div>
    </div>
  </body>
</html>
