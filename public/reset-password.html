<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <style>
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background-color: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        box-sizing: border-box;
        animation: fadeIn 1s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      h1 {
        margin-bottom: 24px;
        font-size: 28px;
        color: #333;
        text-align: center;
      }
      .form-group {
        margin-bottom: 20px;
        width: 100%;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #666;
        font-size: 14px;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        box-sizing: border-box;
        transition: border-color 0.3s ease;
      }
      .form-group input:focus {
        border-color: #007bff;
        outline: none;
      }
      .form-group .error {
        color: red;
        font-size: 12px;
        display: none;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        box-sizing: border-box;
      }
      button:hover {
        background-color: #0056b3;
      }
      .footer {
        margin-top: 20px;
        text-align: center;
        color: #777;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Reset Password</h1>
      <form id="resetPasswordForm" action="/auth/reset-password" method="post">
        <input type="hidden" name="token" value="{{token}}" />
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            placeholder="Enter your new password"
            required
          />
          <div class="error" id="passwordError">
            Password must include one uppercase letter, one lowercase letter,
            one number, and one special character, and be between 8-128
            characters.
          </div>
        </div>
        <button type="submit">Reset Password</button>
      </form>
      <div class="footer">
        <p>&copy; 2024 Yallery</p>
      </div>
    </div>

    <script>
      document
        .getElementById('resetPasswordForm')
        .addEventListener('submit', function (event) {
          const passwordInput = document.getElementById('newPassword');
          const passwordError = document.getElementById('passwordError');
          const password = passwordInput.value;
          const passwordPattern =
            /((?=.*\d)|(?=.*\W+))(?![.\n])(?=.*[A-Z])(?=.*[a-z]).{8,128}/;

          if (!passwordPattern.test(password)) {
            passwordError.style.display = 'block';
            event.preventDefault();
          } else {
            passwordError.style.display = 'none';
          }
        });
    </script>
  </body>
</html>
