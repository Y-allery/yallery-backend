name: Deploy to PROD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to PROD server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: root
          key: ${{ secrets.PROD_DEPLOY_KEY }}
          # Without this the script runs every line regardless of failures, so a
          # failed migration:run would still be followed by pm2 restart —
          # serving new code against an unmigrated schema.
          script_stop: true
          script: |
            cd /root/yallery-backend
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            npm install
            npm run build
            npm run migration:run
            pm2 restart yallery-backend
